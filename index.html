<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Monetbil Deposit Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Deposit Funds</h1>

  <input type="number" id="amount" placeholder="Amount (XAF)" />

  <select id="operator">

  </select>

  <button onclick="payNow()">Pay Now</button>
</div>

<script src="script.js"></script>

</body>
</html>
